<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK COMMUNITY | Tech & Modding</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, applyActionCode } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDH4fPiKhAtjjOWB2BEjAQh3Gwo2HcWfNg",
            authDomain: "sk-community-47f45.firebaseapp.com",
            projectId: "sk-community-47f45",
            storageBucket: "sk-community-47f45.firebasestorage.app",
            messagingSenderId: "750389765449",
            appId: "1:750389765449:web:1a793c01cd58c87202e698"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CONFIGURATION DISCORD ---
        const DISCORD_CLIENT_ID = "1482940143697662105";
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        // --- GESTION DES RETOURS (MAIL & DISCORD) ---
        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode');
        const mode = urlParams.get('mode');
        const discordCode = urlParams.get('code');

        // Gestion Validation Email
        if (oobCode && mode === 'verifyEmail') {
            applyActionCode(auth, oobCode)
                .then(() => {
                    alert("Email vérifié avec succès ! Connexion en cours...");
                    window.location.href = window.location.pathname;
                })
                .catch(() => alert("Le lien a expiré ou est invalide."));
        }

        // --- GESTION LOGIQUE DISCORD (FRONT-END SIMULATION) ---
        async function handleDiscordLogin(code) {
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            const userIdDisplay = document.getElementById('user-id-display');

            // On simule l'état connecté pour l'UI
            loginBtn.style.display = 'none';
            userProfile.style.display = 'flex';
            userIdDisplay.innerText = "DISCORD_" + code.substring(0, 6);
            
            // On nettoie l'URL pour enlever le ?code=...
            window.history.replaceState({}, document.title, window.location.pathname);
            console.log("Session Discord active (ID temporaire)");
        }

        if (discordCode) {
            handleDiscordLogin(discordCode);
        }

        async function syncUser(user) {
            try {
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    email: user.email,
                    lastLogin: new Date().toLocaleString(),
                    status: "online"
                }, { merge: true });
            } catch (e) { console.error("Erreur base de données:", e); }
        }

        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            const userIdDisplay = document.getElementById('user-id-display');

            if (user) {
                if (!user.emailVerified && !user.providerData.some(p => p.providerId === 'google.com')) {
                    loginBtn.style.display = 'block';
                    userProfile.style.display = 'none';
                    return;
                }
                loginBtn.style.display = 'none';
                userProfile.style.display = 'flex';
                userIdDisplay.innerText = user.uid.substring(0, 10);
                syncUser(user);
            } else if (!discordCode) { // On ne cache pas si on vient de se connecter via Discord
                loginBtn.style.display = 'block';
                userProfile.style.display = 'none';
            }
        });

        window.loginGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); closeAuth(); } catch (e) { alert(e.message); }
        };

        window.loginDiscord = () => {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=identify%20email`;
            window.location.href = url;
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            const passConfirm = document.getElementById('pass-confirm').value;
            const birthValue = document.getElementById('birthdate').value;

            try {
                if (document.getElementById('signup-fields').style.display === "block") {
                    if (pass !== passConfirm) throw new Error("Les mots de passe ne correspondent pas.");
                    if (!birthValue) throw new Error("Veuillez mettre votre date de naissance.");
                    const age = new Date().getFullYear() - new Date(birthValue).getFullYear();
                    if (age < 16) throw new Error("Tu dois avoir au moins 16 ans.");

                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(res.user);
                    alert("Email envoyé ! Vérifie tes spams.");
                    await signOut(auth); 
                    closeAuth();
                } else {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    if (!res.user.emailVerified) {
                        await signOut(auth);
                        throw new Error("Compte non vérifié !");
                    }
                    closeAuth();
                }
            } catch (e) { alert(e.message); }
        };

        window.toggleMode = () => {
            const fields = document.getElementById('signup-fields');
            const btn = document.getElementById('main-auth-btn');
            const link = document.getElementById('toggle-link');
            if (fields.style.display === "none") {
                fields.style.display = "block";
                btn.innerText = "CRÉER MON COMPTE";
                link.innerText = "Déjà un compte ? Se connecter";
            } else {
                fields.style.display = "none";
                btn.innerText = "VALIDER";
                link.innerText = "Pas de compte ? Créer un compte";
            }
        };

        window.logout = () => {
            signOut(auth);
            window.location.href = window.location.pathname; // Reset total
        };
    </script>
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <button id="login-btn" onclick="openAuth()" class="auth-trigger lang" data-fr="CONNEXION" data-en="LOGIN">CONNEXION</button>
                <div id="user-profile" style="display: none; align-items: center; gap: 10px;">
                    <span id="user-id-display" style="color: #00ff88; font-size: 0.7rem; font-family: monospace; border: 1px solid #333; padding: 2px 5px; border-radius: 3px;"></span>
                    <button onclick="logout()" class="logout-btn">✖</button>
                </div>
            </div>
            <div class="logo-container"><div class="logo">SK COMMUNITY</div></div>
            <ul>
                <li><a href="#home" class="lang" data-fr="Accueil" data-en="Home">Accueil</a></li>
                <li><a href="#tools" class="lang" data-fr="Tools" data-en="Tools">Tools</a></li>
                <li><a href="#" onclick="openHelp()" class="lang" data-fr="Help" data-en="Help">Help</a></li>
                <li class="nav-langs">
                    <img src="https://flagcdn.com/w20/fr.png" onclick="setLanguage('fr')" style="cursor:pointer; opacity:0.8;" alt="FR">
                    <img src="https://flagcdn.com/w20/us.png" onclick="setLanguage('en')" style="cursor:pointer; opacity:0.8;" alt="EN">
                </li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1 class="lang" data-fr="L'ÉLITE DU MODDING ET DES TOOLS" data-en="THE ELITE OF MODDING & TOOLS">L'ÉLITE DU MODDING ET DES TOOLS</h1>
        <p class="lang" data-fr="Accédez à des ressources exclusives." data-en="Access exclusive resources.">Accédez à des ressources exclusives.</p>
        <div class="buttons">
            <a href="https://discord.gg/JKaUWpNd" class="btn-primary lang" data-fr="Rejoindre" data-en="Join">Rejoindre</a>
            <a href="#tools" class="btn-secondary lang" data-fr="Outils" data-en="Tools">Outils</a>
        </div>
    </section>

    <div id="authModal" class="help-overlay">
        <div class="help-content card translucent" style="max-width: 350px;">
            <span class="close-help" onclick="closeAuth()">&times;</span>
            <h2 style="color: #00ff88; margin-bottom: 20px;" class="lang" data-fr="COMPTE" data-en="ACCOUNT">COMPTE</h2>
            
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button onclick="loginGoogle()" class="social-btn google-btn">Google Login</button>
                <button onclick="loginDiscord()" class="social-btn" style="background-color: #5865f2; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8rem; box-shadow: 0 0 10px rgba(88, 101, 242, 0.3);">Login with Discord</button>
            </div>

            <div style="margin: 15px 0; color: #444; font-size: 0.7rem;" class="lang" data-fr="OU" data-en="OR">OU</div>
            
            <input type="email" id="email" placeholder="Email" class="auth-field">
            <input type="password" id="pass" placeholder="Password" class="auth-field">
            
            <div id="signup-fields" style="display: none;">
                <input type="password" id="pass-confirm" placeholder="Confirmer" class="auth-field">
                <input type="date" id="birthdate" class="auth-field">
            </div>

            <button id="main-auth-btn" onclick="handleAuth()" class="btn-primary lang" style="width: 100%; margin-top: 10px;" data-fr="VALIDER" data-en="VALIDATE">VALIDER</button>
            <p style="margin-top: 15px; font-size: 0.8rem;">
                <a href="javascript:void(0)" id="toggle-link" onclick="toggleMode()" style="color: #00ff88; text-decoration: none;">Créer un compte</a>
            </p>
        </div>
    </div>

    <script>
        function setLanguage(lang) {
            const elements = document.querySelectorAll('.lang');
            elements.forEach(el => {
                const translation = el.getAttribute('data-' + lang);
                if (translation) { el.innerHTML = translation; }
            });
            localStorage.setItem('selectedLang', lang);
        }
        function openHelp() { document.getElementById('helpModal').style.display = 'flex'; }
        function closeHelp() { document.getElementById('helpModal').style.display = 'none'; }
        function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('authModal').style.display = 'none'; }

        window.onload = () => {
            const savedLang = localStorage.getItem('selectedLang') || 'fr';
            setLanguage(savedLang);
        };
    </script>
</body>
</html>
