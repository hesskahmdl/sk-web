<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK COMMUNITY | Tech & Modding</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDH4fPiKhAtjjOWB2BEjAQh3Gwo2HcWfNg",
            authDomain: "sk-community-47f45.firebaseapp.com",
            projectId: "sk-community-47f45",
            storageBucket: "sk-community-47f45.firebasestorage.app",
            messagingSenderId: "750389765449",
            appId: "1:750389765449:web:1a793c01cd58c87202e698"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        async function syncUser(user) {
            try {
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    email: user.email,
                    lastLogin: new Date().toLocaleString(),
                    verified: user.emailVerified
                }, { merge: true });
            } catch (e) { console.error(e); }
        }

        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            const userIdDisplay = document.getElementById('user-id-display');

            if (user) {
                // BLOCAGE : Si l'email n'est pas vérifié, on ne le laisse pas entrer
                if (!user.emailVerified && !user.providerData.some(p => p.providerId === 'google.com')) {
                    alert("Veuillez vérifier votre boîte mail et cliquer sur le lien envoyé avant de vous connecter.");
                    signOut(auth); // On le déconnecte de force
                    return;
                }

                loginBtn.style.display = 'none';
                userProfile.style.display = 'flex';
                userIdDisplay.innerText = user.uid.substring(0, 10);
                syncUser(user);
            } else {
                loginBtn.style.display = 'block';
                userProfile.style.display = 'none';
            }
        });

        let isSignUpMode = false;
        window.toggleAuthMode = () => {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? "CRÉER UN COMPTE" : "CONNEXION";
            document.getElementById('signup-only-fields').style.display = isSignUpMode ? "block" : "none";
            document.getElementById('auth-submit-btn').innerText = isSignUpMode ? "S'INSCRIRE" : "VALIDER";
            document.getElementById('toggle-text').innerText = isSignUpMode ? "Déjà un compte ?" : "Pas de compte ?";
            document.getElementById('toggle-link').innerText = isSignUpMode ? "Se connecter" : "Créer un compte";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            const errorEl = document.getElementById('auth-error');
            errorEl.style.display = "none";

            try {
                if (isSignUpMode) {
                    const passConfirm = document.getElementById('pass-confirm').value;
                    if (pass !== passConfirm) throw new Error("Les mots de passe ne correspondent pas.");

                    const birthValue = document.getElementById('birthdate').value;
                    if (!birthValue) throw new Error("Entrez votre date de naissance.");
                    const birthdate = new Date(birthValue);
                    const age = new Date().getFullYear() - birthdate.getFullYear();
                    if (age < 16) throw new Error("Interdit aux moins de 16 ans.");

                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(res.user);
                    
                    // On informe l'utilisateur
                    alert("INSCRIPTION RÉUSSIE !\n\nUn lien de validation a été envoyé à : " + email + "\n\nTu dois cliquer sur ce lien pour activer ton compte, sinon tu ne pourras pas te connecter.");
                    
                    await signOut(auth); // On le déconnecte tant qu'il n'a pas cliqué sur le lien
                    closeAuth();
                } else {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    if (!res.user.emailVerified) {
                        throw new Error("Ton compte n'est pas encore activé. Vérifie tes e-mails !");
                    }
                    closeAuth();
                }
            } catch (e) {
                errorEl.innerText = translateError(e.code || e.message);
                errorEl.style.display = "block";
            }
        };

        function translateError(code) {
            switch (code) {
                case 'auth/invalid-email': return "Email invalide.";
                case 'auth/user-not-found': return "Compte inexistant.";
                case 'auth/wrong-password': return "Mot de passe faux.";
                case 'auth/email-already-in-use': return "Email déjà pris.";
                default: return code;
            }
        }

        window.loginGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); closeAuth(); } catch (e) { alert(e.message); }
        };

        window.logout = () => signOut(auth);
    </script>
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <button id="login-btn" onclick="openAuth()" class="auth-trigger lang">CONNEXION</button>
                <div id="user-profile" style="display: none; align-items: center; gap: 10px;">
                    <span id="user-id-display" style="color: #00ff88; font-size: 0.7rem; font-family: monospace; border: 1px solid #333; padding: 2px 5px; border-radius: 3px;"></span>
                    <button onclick="logout()" class="logout-btn">✖</button>
                </div>
            </div>
            <div class="logo-container"><div class="logo">SK COMMUNITY</div></div>
            <ul>
                <li><a href="#home">Accueil</a></li>
                <li><a href="#tools">Tools</a></li>
                <li><a href="#" onclick="openHelp()">Help</a></li>
            </ul>
        </nav>
    </header>

    <div id="authModal" class="help-overlay">
        <div class="help-content card translucent" style="max-width: 350px;">
            <span class="close-help" onclick="closeAuth()">&times;</span>
            <h2 id="auth-title" style="color: #00ff88; margin-bottom: 20px;">CONNEXION</h2>
            <button onclick="loginGoogle()" class="social-btn google-btn">Google Login</button>
            <div style="margin: 15px 0; color: #444; font-size: 0.7rem;">OU</div>
            <input type="email" id="email" placeholder="Email" class="auth-field">
            <input type="password" id="pass" placeholder="Mot de passe" class="auth-field">
            <div id="signup-only-fields" style="display: none;">
                <input type="password" id="pass-confirm" placeholder="Confirmer mot de passe" class="auth-field">
                <label style="color: #888; font-size: 0.7rem; display: block; margin-top: 10px;">Date de naissance :</label>
                <input type="date" id="birthdate" class="auth-field">
            </div>
            <p id="auth-error" style="color: #ff4444; font-size: 0.7rem; margin-top: 10px; display: none;"></p>
            <button id="auth-submit-btn" onclick="handleAuth()" class="btn-primary" style="width: 100%; margin-top: 10px;">VALIDER</button>
            <p style="margin-top: 15px; font-size: 0.8rem; color: #aaa;">
                <span id="toggle-text">Pas de compte ?</span> 
                <a href="javascript:void(0)" onclick="toggleAuthMode()" id="toggle-link" style="color: #00ff88; text-decoration: none;">Créer un compte</a>
            </p>
        </div>
    </div>

    <section id="home" class="hero">
        <h1>L'ÉLITE DU MODDING ET DES TOOLS</h1>
        <div class="buttons">
            <a href="https://discord.gg/JKaUWpNd" class="btn-primary">Rejoindre</a>
        </div>
    </section>

    <script>
        function openHelp() { document.getElementById('helpModal').style.display = 'flex'; }
        function closeHelp() { document.getElementById('helpModal').style.display = 'none'; }
        function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('authModal').style.display = 'none'; }
    </script>
</body>
</html>
