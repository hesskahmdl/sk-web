<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK COMMUNITY | Tech & Modding</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, applyActionCode } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDH4fPiKhAtjjOWB2BEjAQh3Gwo2HcWfNg",
            authDomain: "sk-community-47f45.firebaseapp.com",
            projectId: "sk-community-47f45",
            storageBucket: "sk-community-47f45.firebasestorage.app",
            messagingSenderId: "750389765449",
            appId: "1:750389765449:web:1a793c01cd58c87202e698"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CONFIGURATION DISCORD & WEBHOOK ---
        const DISCORD_CLIENT_ID = "1482940143697662105";
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1482942998290632935/iktE4f0UWkcAbnlatLiSnpU8vmuaxxodCz_nzCJJ6UCDaE2V2YKr5FmDsw1olfHVVp8w";

        // Fonction Webhook améliorée pour les infos Discord
        async function sendToWebhook(data) {
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: data.title || "Log Connexion",
                            description: data.desc,
                            thumbnail: { url: data.avatar || "" },
                            color: data.color || 5814783,
                            timestamp: new Date().toISOString()
                        }]
                    })
                });
            } catch (e) { console.error("Webhook error:", e); }
        }

        // --- GESTION DES PARAMÈTRES URL ---
        const urlParams = new URLSearchParams(window.location.search);
        const discordCode = urlParams.get('code');

        // SI CODE DISCORD DÉTECTÉ
        if (discordCode) {
            handleDiscordSession(discordCode);
        }

        async function handleDiscordSession(code) {
            // Ici, on simule la connexion visuelle immédiatement
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            const userIdDisplay = document.getElementById('user-id-display');

            loginBtn.style.display = 'none';
            userProfile.style.display = 'flex';
            userIdDisplay.innerText = "Discord User";

            // Envoi au Webhook du code reçu
            sendToWebhook({
                title: "Discord Login (Code reçu)",
                desc: `**Code:** \`${code}\`\n**Site:** ${window.location.href}`,
                color: 5814783
            });

            // On nettoie l'URL
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        async function syncUser(user) {
            try {
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    email: user.email,
                    lastLogin: new Date().toLocaleString(),
                    status: "online"
                }, { merge: true });
            } catch (e) { console.error("Erreur base de données:", e); }
        }

        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            const userIdDisplay = document.getElementById('user-id-display');

            if (user) {
                if (!user.emailVerified && !user.providerData.some(p => p.providerId === 'google.com')) return;
                loginBtn.style.display = 'none';
                userProfile.style.display = 'flex';
                userIdDisplay.innerText = user.uid.substring(0, 10);
                
                if (!window.notified) {
                    sendToWebhook({
                        title: "Login Firebase",
                        desc: `**ID:** ${user.uid}\n**Email:** ${user.email}`,
                        color: 5763719
                    });
                    window.notified = true; 
                }
                syncUser(user);
            }
        });

        window.loginGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); closeAuth(); } catch (e) { alert(e.message); }
        };

        window.loginDiscord = () => {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=identify%20email`;
            window.location.href = url;
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            try {
                if (document.getElementById('signup-fields').style.display === "block") {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(res.user);
                    alert("Vérifie tes emails !");
                    await signOut(auth); closeAuth();
                } else {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    if (!res.user.emailVerified) throw new Error("Email non vérifié !");
                    closeAuth();
                }
            } catch (e) { alert(e.message); }
        };

        window.toggleMode = () => {
            const fields = document.getElementById('signup-fields');
            const btn = document.getElementById('main-auth-btn');
            const link = document.getElementById('toggle-link');
            if (fields.style.display === "none") {
                fields.style.display = "block";
                btn.innerText = "CRÉER MON COMPTE";
                link.innerText = "Se connecter";
            } else {
                fields.style.display = "none";
                btn.innerText = "VALIDER";
                link.innerText = "Créer un compte";
            }
        };

        window.logout = () => {
            signOut(auth);
            window.location.href = window.location.pathname;
        };
    </script>
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <button id="login-btn" onclick="openAuth()" class="auth-trigger">CONNEXION</button>
                <div id="user-profile" style="display: none; align-items: center; gap: 10px;">
                    <span id="user-id-display" style="color: #00ff88; font-size: 0.7rem; font-family: monospace; border: 1px solid #333; padding: 2px 5px; border-radius: 3px;"></span>
                    <button onclick="logout()" class="logout-btn">✖</button>
                </div>
            </div>
            <div class="logo-container"><div class="logo">SK COMMUNITY</div></div>
            <ul>
                <li><a href="#home">Accueil</a></li>
                <li><a href="#tools">Tools</a></li>
                <li><a href="#" onclick="openHelp()">Help</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1>L'ÉLITE DU MODDING</h1>
        <div class="buttons">
            <a href="https://discord.gg/JKaUWpNd" class="btn-primary">Rejoindre</a>
            <a href="#tools" class="btn-secondary">Outils</a>
        </div>
    </section>

    <div id="authModal" class="help-overlay">
        <div class="help-content card translucent" style="max-width: 350px;">
            <span class="close-help" onclick="closeAuth()">&times;</span>
            <h2 style="color: #00ff88; margin-bottom: 20px;">COMPTE</h2>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button onclick="loginGoogle()" class="social-btn google-btn">Google Login</button>
                <button onclick="loginDiscord()" class="social-btn" style="background-color: #5865f2; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8rem;">Login with Discord</button>
            </div>
            <div style="margin: 15px 0; color: #444; font-size: 0.7rem;">OU</div>
            <input type="email" id="email" placeholder="Email" class="auth-field">
            <input type="password" id="pass" placeholder="Password" class="auth-field">
            <div id="signup-fields" style="display: none;">
                <input type="password" id="pass-confirm" placeholder="Confirmer" class="auth-field">
                <input type="date" id="birthdate" class="auth-field">
            </div>
            <button id="main-auth-btn" onclick="handleAuth()" class="btn-primary" style="width: 100%; margin-top: 10px;">VALIDER</button>
            <p style="margin-top: 15px; font-size: 0.8rem;">
                <a href="javascript:void(0)" id="toggle-link" onclick="toggleMode()" style="color: #00ff88; text-decoration: none;">Créer un compte</a>
            </p>
        </div>
    </div>

    <script>
        function setLanguage(lang) { /* ... */ }
        function openHelp() { document.getElementById('helpModal').style.display = 'flex'; }
        function closeHelp() { document.getElementById('helpModal').style.display = 'none'; }
        function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('authModal').style.display = 'none'; }
    </script>
</body>
</html>
