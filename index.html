<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK COMMUNITY | Tech & Modding</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Tes clés Firebase (Intégrées)
        const firebaseConfig = {
            apiKey: "AIzaSyDH4fPiKhAtjjOWB2BEjAQh3Gwo2HcWfNg",
            authDomain: "sk-community-47f45.firebaseapp.com",
            projectId: "sk-community-47f45",
            storageBucket: "sk-community-47f45.firebasestorage.app",
            messagingSenderId: "750389765449",
            appId: "1:750389765449:web:1a793c01cd58c87202e698"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Sauvegarder l'utilisateur dans la base de données
        async function saveUserToDB(user) {
            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                email: user.email,
                lastLogin: new Date(),
                purchases: [] // Tu pourras voir ça dans Firestore
            }, { merge: true });
        }

        // Persistance de la connexion au reload
        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            const userIdDisplay = document.getElementById('user-id-display');

            if (user) {
                loginBtn.style.display = 'none';
                userProfile.style.display = 'flex';
                userIdDisplay.innerText = user.uid.substring(0, 10);
                saveUserToDB(user);
            } else {
                loginBtn.style.display = 'block';
                userProfile.style.display = 'none';
            }
        });

        // Connexion Google
        window.loginGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try { 
                await signInWithPopup(auth, provider); 
                closeAuth(); 
            } catch (e) { alert("Erreur Google: " + e.message); }
        };

        // Inscription Email + Envoi Confirmation
        window.signUpEmail = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Remplis les champs !");
            
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(res.user);
                alert("Email de confirmation envoyé ! Vérifiez vos spams.");
                closeAuth();
            } catch (e) { alert("Erreur: " + e.message); }
        };

        window.logout = () => signOut(auth);
    </script>
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <button id="login-btn" onclick="openAuth()" class="auth-trigger lang" data-fr="CONNEXION" data-en="LOGIN">CONNEXION</button>
                <div id="user-profile" style="display: none; align-items: center; gap: 10px;">
                    <span id="user-id-display" style="color: #00ff88; font-size: 0.7rem; font-family: monospace; border: 1px solid #333; padding: 2px 5px; border-radius: 3px;"></span>
                    <button onclick="logout()" class="logout-btn">✖</button>
                </div>
            </div>

            <div class="logo-container">
                <div class="logo">SK COMMUNITY</div>
            </div>

            <ul>
                <li><a href="#home" class="lang" data-fr="Accueil" data-en="Home">Accueil</a></li>
                <li><a href="#tools" class="lang" data-fr="Tools" data-en="Tools">Tools</a></li>
                <li><a href="#" onclick="openHelp()" class="lang" data-fr="Help" data-en="Help">Help</a></li>
                <li class="nav-langs">
                    <img src="https://flagcdn.com/w20/fr.png" onclick="setLanguage('fr')" alt="FR">
                    <img src="https://flagcdn.com/w20/us.png" onclick="setLanguage('en')" alt="EN">
                </li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1 class="lang" data-fr="L'ÉLITE DU MODDING ET DES TOOLS" data-en="THE ELITE OF MODDING & TOOLS">L'ÉLITE DU MODDING ET DES TOOLS</h1>
        <div class="buttons">
            <a href="https://discord.gg/JKaUWpNd" class="btn-primary lang" data-fr="Rejoindre maintenant" data-en="Join now">Rejoindre maintenant</a>
        </div>
    </section>

    <div id="authModal" class="help-overlay">
        <div class="help-content card translucent" style="max-width: 350px;">
            <span class="close-help" onclick="closeAuth()">&times;</span>
            <h2 style="color: #00ff88; margin-bottom: 20px;" class="lang" data-fr="BIENVENUE" data-en="WELCOME">BIENVENUE</h2>
            
            <button onclick="loginGoogle()" class="social-btn google-btn">Google Login</button>
            
            <div style="margin: 15px 0; color: #444; font-size: 0.7rem;" class="lang" data-fr="OU EMAIL" data-en="OR EMAIL">OU EMAIL</div>
            
            <input type="email" id="email" placeholder="Email" class="auth-field">
            <input type="password" id="pass" placeholder="Password" class="auth-field">
            
            <button onclick="signUpEmail()" class="btn-primary lang" style="width: 100%; margin-top: 10px;" data-fr="S'INSCRIRE" data-en="SIGN UP">S'INSCRIRE</button>
        </div>
    </div>

    <div id="helpModal" class="help-overlay">
        <div class="help-content card translucent">
            <span class="close-help" onclick="closeHelp()">&times;</span>
            <h2 style="color: #00ff88;">HELP</h2>
            <p class="lang" data-fr="Ouvrez un ticket sur Discord en cas de problème." data-en="Open a ticket on Discord if you have an issue.">Ouvrez un ticket sur Discord en cas de problème.</p>
            <a href="https://discord.gg/JKaUWpNd" class="btn-primary lang" data-fr="DISCORD" data-en="DISCORD">DISCORD</a>
        </div>
    </div>

    <script>
        function setLanguage(lang) {
            document.querySelectorAll('.lang').forEach(el => {
                const text = el.getAttribute('data-' + lang);
                if (text) el.innerHTML = text;
            });
            localStorage.setItem('selectedLang', lang);
        }
        function openHelp() { document.getElementById('helpModal').style.display = 'flex'; }
        function closeHelp() { document.getElementById('helpModal').style.display = 'none'; }
        function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('authModal').style.display = 'none'; }
        window.onload = () => { setLanguage(localStorage.getItem('selectedLang') || 'fr'); };
    </script>
</body>
</html>
